<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来视界 | NEXUS VIEW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Rajdhani', 'sans-serif'],
                        display: ['Orbitron', 'sans-serif'],
                    },
                    colors: {
                        cyber: {
                            blue: '#00f3ff',
                            dark: '#050b14',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050b14;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0;
        }
        
        .scanline-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .cyber-card {
            background: rgba(5, 11, 20, 0.95);
            border: 1px solid rgba(0, 243, 255, 0.2);
            position: relative;
        }

        .corner-decoration::before, .corner-decoration::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid #00f3ff;
            z-index: 20;
        }
        .corner-decoration::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .corner-decoration::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        .cyber-btn {
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: all 0.2s ease;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid #00f3ff;
            color: #00f3ff;
        }
        .cyber-btn:hover {
            background: #00f3ff;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        video {
            filter: none !important;
            mix-blend-mode: normal !important;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 md:p-8 relative">
    <div class="scanline-overlay"></div>

    <header class="mb-8 text-center relative z-10">
        <h1 class="text-4xl md:text-6xl font-bold tracking-tighter font-display text-white italic">
            NEXUS <span class="text-cyber-blue">VIEW</span>
        </h1>
        <p class="text-cyber-blue/50 text-[10px] tracking-[0.4em] uppercase mt-2">Local Data Access Node</p>
    </header>

    <main class="w-full max-w-5xl relative z-10">
        <div class="cyber-card corner-decoration shadow-2xl">
            <div class="flex justify-between items-center px-4 py-2 border-b border-cyber-blue/10 bg-black/40">
                <div class="flex items-center gap-2">
                    <div id="status-indicator" class="w-2 h-2 bg-yellow-500 rounded-full shadow-[0_0_5px_#eab308]"></div>
                    <span id="status-text" class="font-mono text-[10px] text-cyber-blue/80">STATUS: INITIALIZING_STREAM</span>
                </div>
                <div id="clock" class="font-mono text-[10px] text-cyber-blue/40 italic">TIMESTAMP: 00:00:00</div>
            </div>

            <div class="bg-black relative">
                <video 
                    id="mainVideo"
                    class="w-full h-auto block"
                    controls
                    preload="auto"
                ></video>
            </div>
            
            <div class="p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                <div>
                    <h2 class="text-xl font-display text-white tracking-wider">VIDEO_DATA_SOURCE_01</h2>
                    <p class="text-cyber-blue/40 text-xs font-mono mt-1">FORMAT: HLS (M3U8) / STREAMING / SIZE: ADAPTIVE</p>
                </div>
                
                <div class="flex gap-4">
                    <a 
                        href="video.mp4" 
                        download="NEXUS_VIEW_VIDEO.mp4" 
                        class="cyber-btn px-8 py-3 text-xs font-bold tracking-widest flex items-center gap-2"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        DOWNLOAD RAW FILE
                    </a>
                </div>
            </div>

            <div class="grid grid-cols-3 border-t border-cyber-blue/10 bg-black/20 text-[9px] font-mono text-cyber-blue/30 italic">
                <div class="p-2 border-r border-cyber-blue/10 text-center">STORAGE: DISTRIBUTED_NODE</div>
                <div class="p-2 border-r border-cyber-blue/10 text-center">PROTOCOL: HLS_STREAM</div>
                <div class="p-2 text-center">ACCESS: PUBLIC</div>
            </div>
        </div>
    </main>

    <script>
        // 实时时钟
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = `TIMESTAMP: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // HLS 流媒体播放逻辑
        const video = document.getElementById('mainVideo');
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        
        // 视频源替换为切片后的 m3u8 文件
        const videoSrc = 'index.m3u8'; 

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                // 流解析成功，更新UI状态为绿色稳定
                statusIndicator.classList.replace('bg-yellow-500', 'bg-green-500');
                statusIndicator.classList.replace('shadow-[0_0_5px_#eab308]', 'shadow-[0_0_5px_#22c55e]');
                statusText.innerText = 'STATUS: STREAM_LINK_STABLE';
            });
            
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    statusIndicator.classList.replace('bg-green-500', 'bg-red-500');
                    statusIndicator.classList.replace('bg-yellow-500', 'bg-red-500');
                    statusIndicator.classList.replace('shadow-[0_0_5px_#22c55e]', 'shadow-[0_0_5px_#ef4444]');
                    statusText.innerText = 'STATUS: STREAM_ERROR';
                }
            });
        }
        // 兼容原生支持 HLS 的浏览器 (如 Safari)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                statusIndicator.classList.replace('bg-yellow-500', 'bg-green-500');
                statusIndicator.classList.replace('shadow-[0_0_5px_#eab308]', 'shadow-[0_0_5px_#22c55e]');
                statusText.innerText = 'STATUS: NATIVE_LINK_STABLE';
            });
        }

        // GitHub Pages / 本地运行检查
        if (window.location.protocol === 'file:') {
            console.warn("警告：直接双击打开 HTML 无法加载 HLS 流媒体，跨域安全策略会阻止加载 m3u8 文件。请使用 Live Server 插件或上传至服务器运行。");
            statusIndicator.classList.replace('bg-yellow-500', 'bg-red-500');
            statusText.innerText = 'STATUS: LOCAL_FILE_PROTOCOL_BLOCKED';
            alert("请通过本地服务器(如 VSCode Live Server)或上传至远端服务器来查看流媒体视频。直接双击 HTML 无法读取切片文件。");
        }
    </script>
</body>
</html>
