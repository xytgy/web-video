<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精彩视频展示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .video-container {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .gradient-text {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 md:p-8">
    <!-- 背景装饰 -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-500/20 rounded-full blur-[120px] -z-10 animate-pulse"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/20 rounded-full blur-[120px] -z-10 animate-pulse" style="animation-delay: 2s;"></div>

    <header class="mb-12 text-center animate-float">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight">
            <span class="gradient-text">视觉盛宴</span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto font-light">
            沉浸式体验，探索每一个精彩瞬间
        </p>
    </header>

    <main class="w-full max-w-5xl">
        <div class="glass-card rounded-3xl p-4 md:p-8 transition-all duration-500 hover:shadow-2xl hover:shadow-blue-500/10 group">
            <div class="video-container bg-black aspect-video flex items-center justify-center">
                <video 
                    controls 
                    autoplay 
                    loop
                    class="w-full h-full object-contain"
                >
                    <source src="video.mp4" type="video/mp4">
                    您的浏览器不支持 HTML5 视频播放。
                </video>
            </div>
            
            <div class="mt-8 flex flex-col md:flex-row md:items-center justify-between gap-6 px-2">
                <div>
                    <h2 class="text-2xl font-semibold text-white mb-2">作品展示：Video Showcase</h2>
                    <div class="flex gap-3">
                        <span class="px-3 py-1 bg-blue-500/10 text-blue-400 rounded-full text-xs font-medium border border-blue-500/20">HD 1080p</span>
                        <span class="px-3 py-1 bg-purple-500/10 text-purple-400 rounded-full text-xs font-medium border border-purple-500/20">Cinematic</span>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <button class="px-6 py-2 bg-white/10 hover:bg-white/20 text-white rounded-xl transition-all duration-300 flex items-center gap-2 text-sm font-medium border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14l-7 7-7-7"/><path d="M12 21V3"/></svg>
                        下载
                    </button>
                    <button class="px-6 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-xl transition-all duration-300 shadow-lg shadow-blue-600/25 flex items-center gap-2 text-sm font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                        分享
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-16 text-slate-500 text-sm font-light">
        &copy; 2026 视频展示平台 • 创意由人工智能驱动
    </footer>
</body>
</html>
